# Bluetooth core
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y

# GATT (implicit in Zephyr 4.x – DO NOT enable BT_GATT_SERVER)
CONFIG_BT_GATT_DYNAMIC_DB=y

# Device name
CONFIG_BT_DEVICE_NAME="ESP32_BLE_LED"
CONFIG_BT_DEVICE_APPEARANCE=0

# Advertising / connections
CONFIG_BT_MAX_CONN=1

# Debug
CONFIG_PRINTK=y
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
