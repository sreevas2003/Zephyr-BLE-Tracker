# Kernel
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_HEAP_MEM_POOL_SIZE=16384

# Console
CONFIG_PRINTK=y
CONFIG_UART_CONSOLE=y

# Bluetooth
CONFIG_BT=y
CONFIG_BT_HCI=y
CONFIG_BT_OBSERVER=y
CONFIG_BT_BROADCASTER=n
CONFIG_BT_PERIPHERAL=n
CONFIG_BT_CENTRAL=n

# Logging (optional but useful)
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
